[package]
name = "neco-view2d"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "MIT"
description = "2D view coordinate transform (pan / zoom)"
repository = "https://github.com/barineco/neco-crates"
readme = "README.md"
documentation = "https://docs.rs/neco-view2d"
keywords = ["view", "camera", "2d", "ui", "zoom"]
categories = ["graphics"]

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"], optional = true }
