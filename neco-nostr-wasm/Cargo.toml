[package]
name = "neco-nostr-wasm"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "MIT"
description = "minimum dependency WebAssembly bindings for neco-secp and neco-vault"
repository = "https://github.com/barineco/neco-crates"
readme = "README.md"
documentation = "https://docs.rs/neco-nostr-wasm"
keywords = ["wasm", "nostr", "crypto", "secp256k1", "vault"]
categories = ["wasm", "cryptography"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
neco-secp = { version = "0.1.0", path = "../neco-secp", default-features = false, features = ["nostr", "nip19", "nip04", "nip44", "batch"] }
neco-vault = { version = "0.1.0", path = "../neco-vault", default-features = false, features = ["nostr", "nip04", "nip44", "nip17", "encrypted", "security-hardening"] }
bech32 = "0.9"
serde_json = "1"
wasm-bindgen = "0.2"

[dev-dependencies]
wasm-bindgen-test = "0.3"
