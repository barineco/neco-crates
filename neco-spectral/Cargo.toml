[package]
name = "neco-spectral"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "MIT"
description = "Spectral clustering via normalized Laplacian, LOBPCG, and k-means"
repository = "https://github.com/barineco/neco-crates"
readme = "README.md"
documentation = "https://docs.rs/neco-spectral"
keywords = ["spectral", "clustering", "graph", "laplacian"]
categories = ["algorithms", "mathematics", "science"]

[dependencies]
neco-sparse = { version = "0.1", path = "../neco-sparse" }
neco-eigensolve = { version = "0.1", path = "../neco-eigensolve" }
neco-kmeans = { version = "0.1", path = "../neco-kmeans" }

[lib]
path = "src/lib.rs"
