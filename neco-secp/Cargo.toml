[package]
name = "neco-secp"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "MIT"
description = "Minimal secp256k1 and Nostr signing core"
repository = "https://github.com/barineco/neco-crates"
readme = "README.md"
documentation = "https://docs.rs/neco-secp"
keywords = ["secp256k1", "schnorr", "nostr", "crypto"]
categories = ["cryptography"]
exclude = ["tests/atproto-interop"]

[features]
default = ["nostr"]
nostr = ["dep:neco-json", "dep:neco-sha2"]
batch = []
nip19 = ["dep:bech32"]
nip04 = ["dep:aes", "dep:neco-base64", "dep:cbc"]
nip44 = ["dep:neco-base64", "dep:chacha20", "dep:neco-sha2"]
serde = ["dep:serde"]

[dependencies]
aes = { version = "0.8", optional = true }
neco-base64 = { path = "../neco-base64", version = "0.1", optional = true }
bech32 = { version = "0.9", optional = true }
cbc = { version = "0.1", optional = true }
chacha20 = { version = "0.9", optional = true }
k256 = { version = "0.13", features = ["ecdh", "schnorr", "ecdsa"] }
neco-sha2 = { path = "../neco-sha2", version = "0.1", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
neco-json = { path = "../neco-json", version = "0.1", optional = true }

[[bench]]
name = "vanity_bench"
harness = false
required-features = ["batch", "nip19"]

[dev-dependencies]
neco-json = { path = "../neco-json" }
neco-sha2 = { path = "../neco-sha2" }

[lib]
path = "src/lib.rs"
