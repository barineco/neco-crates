[package]
name = "neco-stencil"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "MIT"
description = "Finite-difference stencil operators on uniform 2D grids"
repository = "https://github.com/barineco/neco-crates"
readme = "README.md"
documentation = "https://docs.rs/neco-stencil"
keywords = ["finite-difference", "stencil", "pde", "laplacian", "grid"]
categories = ["mathematics", "science", "algorithms"]

[features]
default = []
rayon = ["dep:rayon"]

[dependencies]
rayon = { version = "1", optional = true }
