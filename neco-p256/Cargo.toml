[package]
name = "neco-p256"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "MIT"
description = "minimum dependency P-256 ECDSA signing core"
repository = "https://github.com/barineco/neco-crates"
readme = "README.md"
documentation = "https://docs.rs/neco-p256"
keywords = ["p256", "ecdsa", "crypto"]
categories = ["cryptography"]
exclude = ["tests/atproto-interop"]

[dependencies]
neco-galois = { path = "../neco-galois", version = "0.1" }
neco-sha2 = { path = "../neco-sha2", version = "0.1" }
getrandom = "0.2"

[dev-dependencies]
neco-json = { path = "../neco-json", version = "0.1" }
neco-sha2 = { path = "../neco-sha2", version = "0.1" }

[lib]
path = "src/lib.rs"
